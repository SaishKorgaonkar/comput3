name: Deploy on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger COMPUT3 deployment
    runs-on: ubuntu-latest
    steps:
      - name: Compute HMAC-SHA256 signature
        id: sign
        run: |
          PAYLOAD='{"ref":"${{ github.ref }}","sha":"${{ github.sha }}","repo":"${{ github.repository }}"}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.COMPUT3_WEBHOOK_SECRET }}" | sed 's/^.* //')
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT
          echo "sig=sha256=$SIG" >> $GITHUB_OUTPUT

      - name: Send webhook to COMPUT3
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${{ steps.sign.outputs.sig }}" \
            -d '${{ steps.sign.outputs.payload }}' \
            "${{ secrets.COMPUT3_WEBHOOK_URL }}")
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Webhook failed with HTTP $HTTP_STATUS"
            exit 1
          fi
